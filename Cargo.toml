[package]
name = "llaas"
version = "0.1.0"
edition = "2024"

[dependencies]
rust-bert = "0.23.0"
tch = "0.17.0"
console = { version = "0.16.3", features = ["std"] }
prost = "0.14"
tonic = "*"
tonic-prost = "*"
tokio = { version = "1.0", features = ["macros", "rt-multi-thread"] }
clap = { version = "4", features = ["derive"] }
epub = "2"
serde_json = "1"
html2text = "0.4"
unicode-segmentation = "1.13.3"

[build-dependencies]
tonic-prost-build = "*"
